name: Deploy Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: deleg8-dev
  REGION: us-central1
  SERVICE: company-brain-harness-site
  ARTIFACT_REPOSITORY: company-brain-harness
  SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://company-brain-harness.run.app' }}

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "$REGION-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository
        run: |
          gcloud artifacts repositories describe "$ARTIFACT_REPOSITORY" \
            --project "$PROJECT_ID" \
            --location "$REGION" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "$ARTIFACT_REPOSITORY" \
            --project "$PROJECT_ID" \
            --location "$REGION" \
            --repository-format docker \
            --description "Company Brain Harness deploy images"

      - name: Build and push container
        run: |
          IMAGE="$REGION-docker.pkg.dev/$PROJECT_ID/$ARTIFACT_REPOSITORY/$SERVICE:$GITHUB_SHA"
          docker build \
            --build-arg "NEXT_PUBLIC_SITE_URL=$SITE_URL" \
            -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE" \
            --allow-unauthenticated \
            --set-env-vars "NEXT_PUBLIC_SITE_URL=$SITE_URL" \
            --quiet
